<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03 2025 — your name</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <nav>
    <a href="../index.html" class="site-title">your name</a>
    <div class="nav-links">
      <a href="../index.html">work</a>
      <a href="../blog.html">blog</a>
    </div>
  </nav>

  <main class="post">

    <header class="post-header">
      <span class="post-date">03 2025</span>
      <!-- Optional: add a title below, or delete the h1 entirely -->
      <!-- <h1>post title</h1> -->
    </header>

    <div class="post-content">

      <!-- ── Single full-width image ── -->
      <div class="block-image">
        <img src="../images/your-image.jpg" alt="">
        <!-- Optional caption. Delete the <p> if not needed. -->
        <p class="caption">caption text here</p>
      </div>

      <!-- ── Two images side by side ── -->
      <div class="block-image-pair">
        <img src="../images/your-image-left.jpg" alt="">
        <img src="../images/your-image-right.jpg" alt="">
      </div>

      <!-- ── Text block ── -->
      <div class="block-text">
        <p>Your writing goes here. This could be a reflection, a description, notes from the month — whatever you want. The font is Times New Roman to match your site's body style.</p>
        <p>Add more paragraphs by duplicating the &lt;p&gt; tag above.</p>
      </div>

      <!-- ── Another single image, no caption ── -->
      <div class="block-image">
        <img src="../images/your-image-2.jpg" alt="">
      </div>

    </div>

    <div class="post-back">
      <a href="../blog.html">← all posts</a>
    </div>

  </main>

</body>
</html>
